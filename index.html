<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="game-shell">
    <header class="game-header">
      <h1>贪吃蛇</h1>
      <p>支持键盘与触控双操作。</p>
    </header>

    <section class="game-settings" aria-label="游戏设置">
      <label class="setting-item" for="difficulty-select">
        <span>难度</span>
        <select id="difficulty-select">
          <option value="easy">简单</option>
          <option value="normal" selected>普通</option>
          <option value="hard">困难</option>
        </select>
      </label>
      <label class="setting-item" for="theme-select">
        <span>主题</span>
        <select id="theme-select">
          <option value="amber" selected>琥珀暖阳</option>
          <option value="ocean">海风霓彩</option>
          <option value="forest">森林薄荷</option>
        </select>
      </label>
    </section>

    <section class="status-board" aria-label="游戏状态">
      <div class="status-item">
        <span>当前分数</span>
        <strong id="score">0</strong>
      </div>
      <div class="status-item">
        <span>最高分</span>
        <strong id="best-score">0</strong>
      </div>
      <div class="status-item">
        <span>状态</span>
        <strong id="game-state">等待开始</strong>
      </div>
      <div class="status-item">
        <span>生命值</span>
        <strong id="lives">3</strong>
      </div>
      <div class="status-item">
        <span>当前道具</span>
        <strong id="target-type">🍎</strong>
      </div>
    </section>

    <section class="board-wrap">
      <canvas id="game-board" width="480" height="480" aria-label="贪吃蛇棋盘"></canvas>
      <div class="game-overlay" id="overlay">
        <p id="overlay-text">点击“开始游戏”开始挑战</p>
      </div>
    </section>

    <section class="actions">
      <button id="start-btn" type="button">开始游戏</button>
      <button id="pause-btn" type="button">暂停</button>
      <button id="restart-btn" type="button">重新开始</button>
    </section>

    <section class="touch-controls" aria-label="触控方向键">
      <button class="control-btn" data-dir="up" type="button">↑</button>
      <div class="mid-controls">
        <button class="control-btn" data-dir="left" type="button">←</button>
        <button class="control-btn" data-dir="down" type="button">↓</button>
        <button class="control-btn" data-dir="right" type="button">→</button>
      </div>
    </section>
  </main>

  <section class="intro-modal" id="intro-modal" aria-label="游戏说明">
    <div class="intro-card">
      <h2>欢迎来到贪吃蛇</h2>
      <p>键盘方向键或 WASD 都可以移动，空格可暂停/继续。</p>
      <p>R 键可立即重新开始，P 键可暂停/继续。</p>
      <p>触屏设备可使用下方方向按钮操作。</p>
      <div class="intro-actions">
        <button id="intro-start-btn" type="button">开始游戏</button>
        <button id="intro-close-btn" type="button">我先看看</button>
      </div>
    </div>
  </section>

  <script src="game.js"></script>
</body>
</html>
